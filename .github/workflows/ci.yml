name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install hatch
        run: pip install hatch

      - name: Run unit tests
        run: hatch test --cover --ignore=tests/integration

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install hatch
        run: pip install hatch

      - name: Run integration tests (requires Docker)
        run: hatch test tests/integration/ -v --no-cov -m integration
